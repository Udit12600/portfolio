const { useState, useEffect, useRef } = React;

function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          el.classList.add("in-view");
          observer.unobserve(el);
        }
      },
      { threshold: 0.15 }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  return ref;
}

/* ---------- Contact ---------- */
function Contact() {
  const ref = useReveal();
  const [form, setForm] = useState({ name: "", email: "", message: "" });

  function handleChange(e) {
    setForm({ ...form, [e.target.name]: e.target.value });
  }

  function handleSubmit(e) {
    e.preventDefault();
    const subject = encodeURIComponent(`Portfolio contact from ${form.name}`);
    const body = encodeURIComponent(`${form.message}

From: ${form.name} (${form.email})`);
    window.location.href = `mailto:${PROFILE.email}?subject=${subject}&body=${body}`;
  }

  return (
    <section className="pf-section reveal" id="contact" ref={ref}>
      <div className="container">
        <div className="pf-section-label">Contact Me</div>
        <h2>Have a project in mind?</h2>

            <div className="pf-contact-detail"><span>Email</span><a href={`mailto:${PROFILE.email}`}>{PROFILE.email}</a></div>
            <div className="pf-contact-detail"><span>GitHub</span><a href={PROFILE.github} target="_blank" rel="noreferrer">Udit12600</a></div>
            <div className="pf-contact-detail"><span>LinkedIn</span><a href={PROFILE.linkedin} target="_blank" rel="noreferrer">uditanshu-kumar</a></div>
          </div>
          <form className="pf-form" onSubmit={handleSubmit}>
            <input type="text" name="name" placeholder="Your name" value={form.name} onChange={handleChange} required />
            <input type="email" name="email" placeholder="Your email" value={form.email} onChange={handleChange} required />
            <textarea name="message" placeholder="Your message" value={form.message} onChange={handleChange} required></textarea>
            <button type="submit" className="btn btn-pf-primary">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  );
}
